version: "3.8"

services:
  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://100.64.132.90:9000
        VITE_WS_URL: ws://100.64.132.90:9000/ws/queue-status
    ports:
      - "9030:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9000:8000"
    env_file:
      - .env
    volumes:
      - shared-tmp:/tmp/facebook_data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - mongodb
    networks:
      - app-network

  # ─── Celery Worker (Scrape + Ingest Tasks) ──────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -l info -Q scrape_queue,ingest_queue -c 8
    env_file:
      - .env
    volumes:
      - shared-tmp:/tmp/facebook_data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - mongodb
      - scraper-bot-1
      - scraper-bot-2
      - scraper-bot-3
      - scraper-bot-4
      - scraper-bot-5
      - scraper-bot-6
      - scraper-bot-7
      - scraper-bot-8
    networks:
      - app-network

  # ─── Celery Beat (Periodic Scheduler) ───────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - app-network

  # ─── Scraper Bots (4 parallel instances) ───────────────────
  scraper-bot-1:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: scraper-bot-1
    environment:
      - HTTP_PASSWORD=123456
      - VNC_PASSWORD=123456
      - USER=root
      - PASSWORD=123456
      - RESOLUTION=1920x1080
      - TEMP_DIR=/tmp
    ports:
      - "9091:80"
      - "9802:5900"
    volumes:
      - /dev/shm:/dev/shm
      - shared-tmp:/tmp/facebook_data
    restart: always
    user: root
    networks:
      - app-network

  scraper-bot-2:
