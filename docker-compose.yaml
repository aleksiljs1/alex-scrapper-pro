  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # ─── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "9017:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      - MONGO_INITDB_DATABASE=facebook_scraper
    networks:
      - app-network

volumes:
  shared-tmp:
  redis-data:
  mongo-data:

networks:
  app-network:
    driver: bridge
